<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chúc Mừng Năm Mới 2026</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #000;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        canvas {
            display: block;
            cursor: crosshair;
        }

    </style>
    <!-- Thư viện MediaPipe cho Computer Vision -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/control_utils/control_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
</head>
<body>
    <canvas id="canvas"></canvas>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let cw = window.innerWidth;
        let ch = window.innerHeight;
        let fireworks = [];
        let particles = [];
        // Thêm mảng chứa các hạt tương tác
        let interactiveParticles = [];
        let textCoordinates = []; // Mảng chứa tọa độ các điểm của chữ
        let heartCoordinates = []; // Mảng chứa tọa độ hình trái tim
        let handState = 'neutral'; // 'fist' (nắm), 'open' (mở), 'neutral' (bình thường)
        let currentHandX = cw / 2, currentHandY = ch / 2;
        let hue = 120;
        let timerTotal = 40;
        let timerTick = 0;

        canvas.width = cw;
        canvas.height = ch;

        function random(min, max) {
            return Math.random() * (max - min) + min;
        }

        class Firework {
            constructor(sx, sy, tx, ty) {
                this.x = sx;
                this.y = sy;
                this.sx = sx;
                this.sy = sy;
                this.tx = tx;
                this.ty = ty;
                this.distanceToTarget = Math.hypot(sx - tx, sy - ty);
                this.distanceTraveled = 0;
                this.coordinates = [];
                this.coordinateCount = 3;
                while(this.coordinateCount--) {
                    this.coordinates.push([this.x, this.y]);
                }
                this.angle = Math.atan2(ty - sy, tx - sx);
                this.speed = 2;
                this.acceleration = 1.05;
                this.brightness = random(50, 70);
            }

            update(index) {
                this.coordinates.pop();
                this.coordinates.unshift([this.x, this.y]);
                this.speed *= this.acceleration;
                const vx = Math.cos(this.angle) * this.speed;
                const vy = Math.sin(this.angle) * this.speed;
                this.distanceTraveled = Math.hypot(this.sx - (this.x + vx), this.sy - (this.y + vy));

                if (this.distanceTraveled >= this.distanceToTarget) {
                    createParticles(this.tx, this.ty);
                    fireworks.splice(index, 1);
                } else {
                    this.x += vx;
                    this.y += vy;
                }
            }

            draw() {
                ctx.beginPath();
                ctx.moveTo(this.coordinates[this.coordinates.length - 1][0], this.coordinates[this.coordinates.length - 1][1]);
                ctx.lineTo(this.x, this.y);
                ctx.strokeStyle = `hsl(${hue}, 100%, ${this.brightness}%)`;
                ctx.stroke();
            }
        }

        class Particle {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.coordinates = [];
                this.coordinateCount = 5;
                while(this.coordinateCount--) {
                    this.coordinates.push([this.x, this.y]);
                }
                this.angle = random(0, Math.PI * 2);
                this.speed = random(1, 10);
                this.friction = 0.96; // Giảm ma sát để nổ to hơn
                this.gravity = 0.7;   // Giảm trọng lực để bay lâu hơn
                this.hue = random(hue - 50, hue + 50);
                this.brightness = random(50, 80);
                this.alpha = 1;
                this.decay = random(0.005, 0.02); // Mờ chậm hơn
            }

            update(index) {
                this.coordinates.pop();
                this.coordinates.unshift([this.x, this.y]);
                this.speed *= this.friction;
                this.x += Math.cos(this.angle) * this.speed;
                this.y += Math.sin(this.angle) * this.speed + this.gravity;
                this.alpha -= this.decay;

                if (this.alpha <= this.decay) {
                    particles.splice(index, 1);
                }
            }

            draw() {
                ctx.beginPath();
                ctx.moveTo(this.coordinates[this.coordinates.length - 1][0], this.coordinates[this.coordinates.length - 1][1]);
                ctx.lineTo(this.x, this.y);
                ctx.strokeStyle = `hsla(${this.hue}, 100%, ${this.brightness}%, ${this.alpha})`;
                ctx.stroke();
            }
        }

        // --- Class cho các hạt tương tác theo tay ---
        class InteractiveParticle {
            constructor(targetX, targetY, heartX, heartY) {
                // Vị trí hiện tại (ngẫu nhiên)
                this.x = Math.random() * cw;
                this.y = Math.random() * ch;
                // Vị trí đích (để xếp thành chữ)
                this.targetX = targetX;
                this.targetY = targetY;
                // Vị trí đích (để xếp thành trái tim)
                this.targetHeartX = heartX;
                this.targetHeartY = heartY;
                
                this.vx = (Math.random() - 0.5) * 2;
                this.vy = (Math.random() - 0.5) * 2;
                this.size = Math.random() * 2 + 1;
                
                // Màu sắc ngẫu nhiên (nhiều màu)
                this.baseHue = Math.random() * 360;
                this.color = `hsla(${this.baseHue}, 100%, 70%, 0.8)`;
                
                this.friction = 0.95;
                this.ease = 0.1; // Độ mượt khi di chuyển về chữ
            }

            update() {
                // Logic tương tác
                if (handState === 'fist') {
                    // Nắm tay: Di chuyển về vị trí tạo thành chữ
                    // Tính khoảng cách tới đích
                    let dx = this.targetX - this.x;
                    let dy = this.targetY - this.y;
                    
                    // Di chuyển theo lực hút về đích
                    this.vx += dx * 0.03;
                    this.vy += dy * 0.03;
                    
                    // Tăng ma sát để hạt dừng lại đúng chỗ (không bị rung lắc)
                    this.friction = 0.85; 

                    // Hiệu ứng lấp lánh khi xếp chữ (đổi độ sáng liên tục)
                    this.color = `hsla(${this.baseHue}, 100%, ${random(50, 100)}%, 0.8)`;

                } else if (handState === 'heart') {
                    // Trái tim: Di chuyển về hình trái tim
                    let dx = this.targetHeartX - this.x;
                    let dy = this.targetHeartY - this.y;
                    this.vx += dx * 0.03;
                    this.vy += dy * 0.03;
                    this.friction = 0.85;
                    // Đổi màu sang tông đỏ/hồng lãng mạn
                    this.color = `hsla(${random(320, 360)}, 100%, 60%, 0.8)`;
                } else if (handState === 'open') {
                    // Mở tay: Phân tán mạnh (Nổ tung)
                    // Tạo lực đẩy ngẫu nhiên mạnh
                    this.vx += (Math.random() - 0.5) * 10;
                    this.vy += (Math.random() - 0.5) * 10;
                    this.friction = 0.95;

                } else {
                    // Bình thường: Trôi lơ lửng tự do
                    this.vx += (Math.random() - 0.5) * 0.2;
                    this.vy += (Math.random() - 0.5) * 0.2;
                    
                    // Giới hạn tốc độ trôi
                    if(this.vx > 2) this.vx = 2;
                    if(this.vy > 2) this.vy = 2;
                    this.friction = 0.98;
                }

                this.vx *= this.friction;
                this.vy *= this.friction;
                this.x += this.vx;
                this.y += this.vy;

                // Giữ hạt trong màn hình
                if (this.x < 0) { this.x = 0; this.vx *= -1; }
                if (this.x > cw) { this.x = cw; this.vx *= -1; }
                if (this.y < 0) { this.y = 0; this.vy *= -1; }
                if (this.y > ch) { this.y = ch; this.vy *= -1; }
            }

            draw() {
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function createParticles(x, y) {
            // Chọn ngẫu nhiên 1 trong 6 hiệu ứng (0-5)
            const effectType = Math.floor(random(0, 6)); 
            let particleCount = 100;

            // Hiệu ứng 0: Nổ tung tóe (Mặc định)
            if (effectType === 0) {
                while(particleCount--) {
                    particles.push(new Particle(x, y));
                }
            } 
            // Hiệu ứng 1: Trái tim (Heart)
            else if (effectType === 1) {
                particleCount = 60;
                for(let i = 0; i < particleCount; i++) {
                    const p = new Particle(x, y);
                    const angle = (Math.PI * 2 * i) / particleCount;
                    // Công thức hình trái tim
                    const vx = 16 * Math.pow(Math.sin(angle), 3);
                    const vy = -(13 * Math.cos(angle) - 5 * Math.cos(2 * angle) - 2 * Math.cos(3 * angle) - Math.cos(4 * angle));
                    
                    p.angle = Math.atan2(vy, vx);
                    p.speed = Math.sqrt(vx*vx + vy*vy) * 0.3; // Điều chỉnh tốc độ
                    p.gravity = 0.4;
                    p.friction = 0.96;
                    particles.push(p);
                }
            }
            // Hiệu ứng 2: Vòng tròn (Ring)
            else if (effectType === 2) {
                particleCount = 80;
                for(let i = 0; i < particleCount; i++) {
                    const p = new Particle(x, y);
                    const angle = (Math.PI * 2 * i) / particleCount;
                    p.angle = angle;
                    p.speed = random(4, 6); // Tốc độ đều nhau tạo thành vòng tròn
                    p.friction = 0.95;
                    particles.push(p);
                }
            }
            // Hiệu ứng 3: Hai vòng tròn (Double Ring)
            else if (effectType === 3) {
                particleCount = 50;
                for(let i = 0; i < particleCount; i++) {
                    const angle = (Math.PI * 2 * i) / particleCount;
                    
                    let p1 = new Particle(x, y);
                    p1.angle = angle;
                    p1.speed = 3;
                    particles.push(p1);

                    let p2 = new Particle(x, y);
                    p2.angle = angle;
                    p2.speed = 6;
                    particles.push(p2);
                }
            }
            // Hiệu ứng 4: Ngôi sao (Star)
            else if (effectType === 4) {
                particleCount = 80;
                for(let i = 0; i < particleCount; i++) {
                    const p = new Particle(x, y);
                    const angle = (Math.PI * 2 * i) / particleCount;
                    const r = 2 + Math.cos(angle * 5); // 5 cánh
                    p.angle = angle;
                    p.speed = r * 2.5;
                    p.friction = 0.95;
                    particles.push(p);
                }
            }
            // Hiệu ứng 5: Mưa sao băng (Willow)
            else {
                particleCount = 120;
                while(particleCount--) {
                    const p = new Particle(x, y);
                    p.speed = random(2, 15);
                    p.friction = 0.92; 
                    p.gravity = 1.5; // Rơi nhanh
                    p.decay = random(0.005, 0.01); // Lâu tan
                    particles.push(p);
                }
            }
        }

        // Hàm tính toán tọa độ các điểm ảnh của chữ
        function calculateTextCoordinates() {
            const offscreenCanvas = document.createElement('canvas');
            const offCtx = offscreenCanvas.getContext('2d');
            offscreenCanvas.width = cw;
            offscreenCanvas.height = ch;

            // Cấu hình font chữ
            offCtx.font = 'bold 100px Arial';
            offCtx.fillStyle = 'white';
            offCtx.textAlign = 'center';
            offCtx.textBaseline = 'middle';

            // Vẽ chữ lên canvas ẩn
            offCtx.fillText('Happy New Year', cw / 2, ch / 2 - 60);
            offCtx.fillText('2026', cw / 2, ch / 2 + 60);

            // Quét dữ liệu pixel
            const imageData = offCtx.getImageData(0, 0, cw, ch).data;
            const coords = [];
            
            // Bước nhảy (gap) để giảm số lượng điểm, tăng hiệu suất
            const gap = 4; 

            for (let y = 0; y < ch; y += gap) {
                for (let x = 0; x < cw; x += gap) {
                    // Kiểm tra độ trong suốt (alpha channel), nếu > 128 là có chữ
                    const alpha = imageData[(y * cw + x) * 4 + 3];
                    if (alpha > 128) {
                        coords.push({ x: x, y: y });
                    }
                }
            }
            return coords;
        }

        // Hàm tính toán tọa độ hình trái tim
        function calculateHeartCoordinates(count) {
            const coords = [];
            const centerX = cw / 2;
            const centerY = ch / 2;
            const scale = 18; // Kích thước trái tim
            
            for (let i = 0; i < count; i++) {
                const t = (Math.PI * 2 * i) / count;
                // Công thức tham số hình trái tim
                let x = 16 * Math.pow(Math.sin(t), 3);
                let y = -(13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t));
                
                coords.push({ x: centerX + x * scale, y: centerY + y * scale });
            }
            return coords;
        }

        function loop() {
            requestAnimationFrame(loop);
            hue = random(0, 360);

            // Tạo hiệu ứng vệt mờ (trails)
            ctx.globalCompositeOperation = 'destination-out';
            ctx.fillStyle = 'rgba(0, 0, 0, 0.5)';
            ctx.fillRect(0, 0, cw, ch);
            ctx.globalCompositeOperation = 'lighter';

            let i = fireworks.length;
            while(i--) {
                fireworks[i].draw();
                fireworks[i].update(i);
            }

            let j = particles.length;
            while(j--) {
                particles[j].draw();
                particles[j].update(j);
            }

            // Cập nhật hạt tương tác
            for (let k = 0; k < interactiveParticles.length; k++) {
                interactiveParticles[k].update();
                interactiveParticles[k].draw();
            }

            // Hiệu ứng bắn pháo hoa từ dưới lên khi nắm tay (xếp chữ)
            if (handState === 'fist') {
                // Tăng xác suất bắn để "nhiều lên" (khoảng 12 quả/giây)
                if (Math.random() < 0.2) { 
                    // Bắn từ vị trí ngẫu nhiên dưới đáy màn hình lên
                    fireworks.push(new Firework(random(0, cw), ch, random(0, cw), random(0, ch / 2)));
                }
            }
        }

        // --- Cấu hình Computer Vision (Nhận diện cử chỉ tay) ---
        const videoElement = document.createElement('video');
        
        // Kiểm tra xem có đang chạy trực tiếp từ file không (sẽ bị chặn camera)
        if (location.protocol === 'file:') {
            alert("Lỗi: Camera không hoạt động ở chế độ file://. Vui lòng chạy bằng Live Server hoặc localhost.");
        }

        // Hiển thị video webcam nhỏ ở góc phải dưới để kiểm tra
        videoElement.style.position = "absolute";
        videoElement.style.bottom = "20px";
        videoElement.style.right = "20px";
        videoElement.style.width = "200px";
        videoElement.style.transform = "scaleX(-1)"; // Lật ngược gương
        videoElement.style.zIndex = "100";
        document.body.appendChild(videoElement);

        let lastHandX = 0;
        let lastTriggerTime = 0;

        function onResults(results) {
            let newHandState = 'neutral';
            let x = cw / 2, y = ch / 2;

            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                // Tính vị trí trung bình của các bàn tay
                let totalX = 0, totalY = 0;
                results.multiHandLandmarks.forEach(lm => {
                    totalX += (1 - lm[0].x);
                    totalY += lm[0].y;
                });
                x = (totalX / results.multiHandLandmarks.length) * cw;
                y = (totalY / results.multiHandLandmarks.length) * ch;

                // --- Logic nhận diện Trái Tim (2 tay) ---
                if (results.multiHandLandmarks.length === 2) {
                    const h1 = results.multiHandLandmarks[0];
                    const h2 = results.multiHandLandmarks[1];
                    
                    // Tính khoảng cách giữa 2 đầu ngón trỏ (số 8) và 2 đầu ngón cái (số 4)
                    const distIndex = Math.hypot(h1[8].x - h2[8].x, h1[8].y - h2[8].y);
                    const distThumb = Math.hypot(h1[4].x - h2[4].x, h1[4].y - h2[4].y);

                    // Nếu 2 ngón trỏ gần nhau VÀ 2 ngón cái gần nhau -> Trái tim
                    if (distIndex < 0.15 && distThumb < 0.15) {
                        newHandState = 'heart';
                    }
                }

                // Nếu không phải trái tim, kiểm tra Nắm/Mở từng tay
                if (newHandState !== 'heart') {
                    const isFist = results.multiHandLandmarks.some(lm => {
                        const d = Math.hypot(lm[12].x - lm[0].x, lm[12].y - lm[0].y);
                        return d < 0.2;
                    });
                    const isOpen = results.multiHandLandmarks.some(lm => {
                        const d = Math.hypot(lm[12].x - lm[0].x, lm[12].y - lm[0].y);
                        return d > 0.3;
                    });

                    if (isFist) newHandState = 'fist';
                    else if (isOpen) newHandState = 'open';
                }
                
                // Tính tốc độ di chuyển ngang của tay
                const speed = Math.abs(x - lastHandX);
                const now = Date.now();

                // Nếu tay di chuyển đủ nhanh (cử chỉ khoác tay/vẫy)
                // speed > 0.03 là ngưỡng nhạy, 150ms là thời gian chờ giữa các lần bắn
                if (speed > 0.03 && now - lastTriggerTime > 150) {
                    // Bắn pháo hoa từ dưới lên đúng vị trí tay của bạn
                    // Bắn chùm 5 quả xung quanh vị trí tay để hoành tráng hơn
                    for(let i = 0; i < 5; i++) {
                        let targetX = (x * cw) + random(-100, 100); // Tản ra xung quanh tay
                        let targetY = (y * ch) + random(-100, 100);
                        fireworks.push(new Firework(x * cw, ch, targetX, targetY));
                    }
                    lastTriggerTime = now;
                }
                lastHandX = x;
            }
            
            currentHandX = x;
            currentHandY = y;
            handState = newHandState;
        }

        const hands = new Hands({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`});
        hands.setOptions({ maxNumHands: 2, modelComplexity: 1, minDetectionConfidence: 0.5, minTrackingConfidence: 0.5 });
        hands.onResults(onResults);

        const camera = new Camera(videoElement, {
            onFrame: async () => { await hands.send({image: videoElement}); },
            width: 640, height: 480
        });
        camera.start();

        window.onload = function() {
            // Tính toán tọa độ chữ trước
            textCoordinates = calculateTextCoordinates();
            // Tính toán tọa độ trái tim
            let totalParticles = Math.max(textCoordinates.length, 1500);
            heartCoordinates = calculateHeartCoordinates(totalParticles);
            
            // Tạo hạt tương ứng với số điểm của chữ (hoặc tối đa 2000 hạt để mượt)

            for(let i = 0; i < totalParticles; i++) {
                // Lấy tọa độ đích từ mảng chữ, nếu hết thì lấy ngẫu nhiên
                let target = textCoordinates[i % textCoordinates.length];
                let heartTarget = heartCoordinates[i % heartCoordinates.length];
                interactiveParticles.push(new InteractiveParticle(target.x, target.y, heartTarget.x, heartTarget.y));
            }
            loop();
        };

        window.onresize = function() {
            cw = window.innerWidth;
            ch = window.innerHeight;
            canvas.width = cw;
            canvas.height = ch;
            // Tính lại chữ khi resize màn hình
            textCoordinates = calculateTextCoordinates();
            heartCoordinates = calculateHeartCoordinates(interactiveParticles.length);
        };
    </script>
</body>
</html>
